<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="chat-layout">

    <div class="sidebar">
        <h2>Chat History</h2>
        <div id="history"></div>
    </div>

    <div class="main-chat">

        <div id="messages"></div>

        <canvas id="graphCanvas"></canvas>

        <div class="input-box">

            <textarea
                id="question"
                placeholder="Continue conversation..."
            ></textarea>

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="graph.js"></script>
<script src="script.js"></script>

</body>
</html>
