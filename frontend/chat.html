<!DOCTYPE html>
<html>

<head>

    <title>Chat</title>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <button id="newChatBtn">

            + New Chat

        </button>

        <h3>

            Chat History

        </h3>

        <div id="chatList">

        </div>

    </aside>

    <main class="main">

        <div id="messages">

        </div>

        <div class="graph-section">

            <h3>
                Model Confidence
            </h3>

            <canvas
                id="graphCanvas">
            </canvas>

        </div>

        <div class="input-box">

            <textarea
                id="question"
                placeholder="Ask an engineering question..."
            ></textarea>

            <button
                onclick="sendMessage()">

                Send

            </button>

        </div>

    </main>

</div>

<script src="graph.js"></script>
<script src="script.js"></script>

</body>
</html>
