<!DOCTYPE html>
<html>

<head>

    <title>Chat</title>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

<div class="container">

    <div class="sidebar">

        <button id="newChatBtn">
            + New Chat
        </button>

        <h3>History</h3>

        <div id="chatList"></div>

    </div>

    <div class="chat-section">

        <div id="messages"></div>

        <canvas id="graphCanvas"></canvas>

        <div class="input-section">

            <textarea
                id="question"
                placeholder="Continue conversation..."
            ></textarea>

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="graph.js"></script>
<script src="script.js"></script>

</body>
</html>
