<!DOCTYPE html>
<html>

<head>

    <title>Multi AI Decision Engine</title>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <button id="newChatBtn">

            + New Chat

        </button>

        <h2>History</h2>

        <div id="chatList"></div>

    </aside>

    <main class="main">

        <div id="messages"></div>

        <div id="graphContainer"></div>

        <div class="input-box">

            <textarea
                id="question"
                placeholder="Ask an engineering question..."
            ></textarea>

            <button onclick="sendMessage()">

                Send

            </button>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
